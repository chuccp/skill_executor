<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>skill_executor</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>skill_executor</h2>
      </div>

      <div class="sidebar-section">
        <h3>会话</h3>
        <button id="new-conversation" class="btn btn-primary">新建</button>
        <ul id="conversation-list" class="conversation-list"></ul>
      </div>

      <div class="sidebar-section">
        <h3>Skill</h3>
        <div class="model-section">
          <select id="skill-select" class="full-select">
            <option value="">无</option>
          </select>
          <button id="skill-refresh" class="btn btn-icon" title="刷新技能">↻</button>
        </div>
      </div>

      <div class="sidebar-section workdir-section">
        <h3>工作目录</h3>
        <textarea id="workdir-input" class="workdir-input" placeholder="输入路径..." rows="2"></textarea>
        <div class="workdir-actions">
          <button id="workdir-set" class="btn btn-primary">切换</button>
          <button id="workdir-up" class="btn">上一级</button>
        </div>
        <div id="workdir-list" class="workdir-list"></div>
      </div>

      <div class="sidebar-footer">
        <div class="sidebar-section">
          <h3>模型</h3>
          <div class="model-section">
            <select id="preset-select" class="full-select">
              <option value="">选择预设...</option>
            </select>
            <button id="config-btn" class="btn btn-icon" title="配置模型">⚙️</button>
          </div>
        </div>
        <div class="sidebar-section">
          <h3>技能</h3>
          <button id="skill-manage-btn" class="btn">管理</button>
        </div>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main">
      <div class="chat-container">
        <div id="messages" class="messages"></div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <div class="input-row">
            <textarea id="user-input" placeholder="输入消息... (Enter 发送，拖拽文件添加路径)" rows="2"></textarea>
            <button id="send-btn" class="btn btn-primary">发送</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>

  <!-- 配置模态框 -->
  <div id="config-modal" class="modal">
    <div class="modal-content modal-large">
      <div class="modal-header">
        <h3>模型管理</h3>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <!-- 现有模型列表 -->
        <div class="preset-list-section">
          <h4>已保存的模型</h4>
          <div id="preset-list" class="preset-list"></div>
        </div>

        <!-- 添加/编辑模型表单 -->
        <div class="preset-form-section">
          <h4 id="form-title">添加新模型</h4>
          <input type="hidden" id="edit-old-name">
          <div class="form-group">
            <label for="config-name">配置名称</label>
            <input type="text" id="config-name" placeholder="例如: Claude-4-Sonnet">
          </div>
          <div class="form-group">
            <label for="config-type">模型类型 (快速填充)</label>
            <select id="config-type" class="full-select">
              <option value="">选择预设...</option>
              <optgroup label="Claude 系列">
                <option value="claude-code">Claude Code (官方)</option>
                <option value="opencode">OpenCode</option>
                <option value="openclaw">OpenClaw</option>
                <option value="claude-sonnet">Claude Sonnet</option>
                <option value="claude-opus">Claude Opus</option>
              </optgroup>
              <optgroup label="OpenAI 系列">
                <option value="gpt-4o">GPT-4o</option>
                <option value="gpt-4-turbo">GPT-4 Turbo</option>
              </optgroup>
              <optgroup label="国产模型">
                <option value="deepseek">DeepSeek</option>
                <option value="qwen">通义千问</option>
                <option value="moonshot">月之暗面 Kimi</option>
                <option value="zhipu">智谱 GLM-4</option>
              </optgroup>
            </select>
          </div>
          <div class="form-group">
            <label for="config-api-key">API Key</label>
            <input type="text" id="config-api-key" placeholder="输入 API Key">
          </div>
          <div class="form-group">
            <label for="config-base-url">Base URL <span class="hint">(可选)</span></label>
            <input type="text" id="config-base-url" placeholder="自定义 API 地址">
          </div>
          <div class="form-group">
            <label for="config-model">模型名称</label>
            <input type="text" id="config-model" placeholder="模型标识符">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="config-cancel" class="btn btn-secondary">取消</button>
        <button id="config-save" class="btn btn-primary">保存</button>
      </div>
    </div>
  </div>

  <!-- 技能管理模态框 -->
  <div id="skill-modal" class="modal">
    <div class="modal-content modal-large">
      <div class="modal-header">
        <h3>技能管理</h3>
        <button class="modal-close" id="skill-modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="skill-manager">
          <div class="skill-list-panel">
            <div class="skill-list-title">技能列表</div>
            <div id="skill-list" class="skill-list"></div>
          </div>
          <div class="skill-detail-panel">
            <div id="skill-detail" class="skill-detail">选择一个技能查看详情</div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="skill-modal-close-footer" class="btn btn-secondary">关闭</button>
      </div>
    </div>
  </div>

  <!-- 会话管理模态框 -->
  <div id="conversation-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>所有会话</h3>
        <button class="modal-close" id="conv-modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div id="conversation-modal-list" class="conversation-modal-list"></div>
      </div>
      <div class="modal-footer">
        <button id="conv-modal-close-footer" class="btn btn-secondary">关闭</button>
      </div>
    </div>
  </div>
</body>
</html>
