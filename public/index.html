<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>skill_executor_web</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>skill_executor_web</h2>
      </div>

      <div class="sidebar-section">
        <h3>会话</h3>
        <button id="new-conversation" class="btn btn-primary">新建</button>
        <ul id="conversation-list" class="conversation-list"></ul>
      </div>

      <div class="sidebar-section">
        <h3>模型</h3>
        <select id="preset-select" class="full-select">
          <option value="">选择预设...</option>
        </select>
      </div>

      <div class="sidebar-section">
        <h3>Skill</h3>
        <select id="skill-select" class="full-select">
          <option value="">无</option>
        </select>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main">
      <div class="chat-container">
        <div id="messages" class="messages"></div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <textarea id="user-input" placeholder="输入消息... (Enter 发送)" rows="2"></textarea>
          <button id="send-btn" class="btn btn-primary">发送</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
